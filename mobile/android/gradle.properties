org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# WP-08-07: the Kotlin incremental compiler's relative-path cache lookup
# throws on Windows when a dependency (Pub cache, typically on C:) and the
# project (this repo, on D:) sit on different drive roots — unrelated to
# app code or release signing, purely a cross-drive path bug in
# `RelocatableFileToPathConverter`. Disabling incremental compilation is
# the standard workaround; it only affects build caching, not output.
kotlin.incremental=false
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
